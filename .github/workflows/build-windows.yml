name: Build Windows EXE

on:
  push:
    branches: [ main ]  # 當你推送到 main 分支時觸發
  workflow_dispatch:     # 允許手動從網頁介面觸發

jobs:
  build:
    runs-on: windows-latest  # 使用 GitHub 的 Windows 伺服器

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 建議使用 3.10 較穩

    - name: 安裝相依套件 (CPU 瘦身版)
      run: |
        python -m pip install --upgrade pip
        # 安裝 CPU 版 Torch 避免體積過大
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install PyQt6 opencv-python numpy easyocr pyinstaller

    - name: 執行 PyInstaller 打包
      run: |
        pyinstaller --noconfirm --onedir --windowed `
        --add-data "assets;assets" `
        --paths "src" `
        --name "AutoLabeler_Windows" `
        src/main.py

    - name: 上傳打包成品
      uses: actions/upload-artifact@v4
      with:
        name: AutoLabeler-Windows-Build
        path: dist/AutoLabeler_Windows/